<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翻译小工具</title>
    <meta name="description" content="手机翻译小工具 - 点击翻译，中英互译">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0E1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="翻译小工具">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230A0E1A'/><text x='50' y='68' font-size='60' text-anchor='middle'>🌐</text></svg>">
    <style>
        /* ============================================================
           变量 & 全局 — 严格遵循 design-spec.md
           ============================================================ */
        :root {
            --bg-deep: #0A0E1A;
            --bg-card: rgba(15, 20, 40, 0.75);
            --text-primary: #E8ECF4;
            --text-secondary: #9CA3B8;
            --accent-cyan: #00E5FF;
            --accent-green: #69F0AE;
            --border-glow: rgba(100, 140, 255, 0.25);
            --border-strong: rgba(100, 140, 255, 0.55);
            --radius: 14px;
            --touch-min: 48px;  /* 触控最小高度 */
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            /* 网格背景 */
            background-image:
                linear-gradient(rgba(100,140,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,140,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ============================================================
           顶部导航栏
           ============================================================ */
        .header {
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glow);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            letter-spacing: 1px;
        }

        /* 翻译方向切换 */
        .lang-toggle {
            display: flex;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
        }

        .lang-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .lang-btn.active {
            background: rgba(0, 229, 255, 0.15);
            color: var(--accent-cyan);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
        }

        /* ============================================================
           模式切换 Tab
           ============================================================ */
        .mode-tabs {
            display: flex;
            gap: 8px;
        }

        .mode-tab {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            color: var(--text-secondary);
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            min-height: var(--touch-min);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mode-tab.active {
            background: rgba(0, 229, 255, 0.08);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.1);
        }

        /* ============================================================
           主内容区
           ============================================================ */
        .main-content {
            flex: 1;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* ============================================================
           输入卡片
           ============================================================ */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }

        /* 文本输入区 */
        .input-area {
            width: 100%;
            min-height: 120px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            padding: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s ease;
            line-height: 1.6;
        }

        .input-area:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.06);
        }

        .input-area::placeholder {
            color: #4A5068;
        }

        /* URL 输入框 */
        .url-input {
            width: 100%;
            height: var(--touch-min);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-mono);
            padding: 0 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .url-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.06);
        }

        .url-input::placeholder {
            color: #4A5068;
            font-family: inherit;
        }

        /* 隐藏 URL 模式（默认显示粘贴模式） */
        .mode-content { display: none; }
        .mode-content.active { display: block; }

        /* ============================================================
           操作按钮
           ============================================================ */
        .btn-primary {
            width: 100%;
            min-height: var(--touch-min);
            background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(179,136,255,0.2));
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            font-family: inherit;
            margin-top: 12px;
            text-shadow: 0 0 10px rgba(0,229,255,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary:hover {
            box-shadow: 0 0 28px rgba(0,229,255,0.2);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }

        /* ============================================================
           文本行显示区
           ============================================================ */
        .lines-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .text-line {
            position: relative;
            padding: 16px 14px;
            min-height: var(--touch-min);
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            /* 左侧指示条 */
            border-left: 3px solid transparent;
        }

        .text-line:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.1);
        }

        .text-line:active {
            background: rgba(0,229,255,0.06);
            border-color: rgba(0,229,255,0.2);
            transition: all 0.05s ease;
        }

        /* 翻译后的行 */
        .text-line.translated {
            border-left-color: var(--accent-cyan);
            border-color: rgba(0,229,255,0.2);
            background: rgba(0,229,255,0.04);
            color: var(--accent-cyan);
        }

        /* 翻译加载中 */
        .text-line.loading {
            opacity: 0.7;
            animation: pulse 1.2s ease-in-out infinite;
            border-left-color: rgba(255,255,255,0.3);
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.4; }
        }

        .text-line .line-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ============================================================
           空状态
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state .text {
            font-size: 14px;
            line-height: 1.8;
        }

        /* ============================================================
           提示 / 辅助信息
           ============================================================ */
        .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        /* ============================================================
           页脚
           ============================================================ */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* ============================================================
           响应式 — 大屏适配
           ============================================================ */
        @media (min-width: 768px) {
            .main-content {
                padding: 24px;
            }
            .text-line {
                font-size: 17px;
            }
        }

        /* ============================================================
           PWA 安装提示横幅
           ============================================================ */
        .install-banner {
            display: none;
            align-items: center;
            gap: 12px;
            background: rgba(0,229,255,0.1);
            border: 1px solid var(--accent-cyan);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 16px;
            animation: slideDown 0.4s ease;
        }
        .install-banner.show {
            display: flex;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .install-banner .info {
            flex: 1;
            font-size: 13px;
            color: var(--accent-cyan);
            line-height: 1.5;
        }
        .install-btn {
            padding: 8px 16px;
            background: var(--accent-cyan);
            color: #0A0E1A;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .install-dismiss {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <!-- ==================== PWA 安装提示 ==================== -->
    <div class="install-banner" id="installBanner">
        <span class="info">📲 添加到桌面，像 App 一样使用</span>
        <button class="install-btn" id="installBtn">安装</button>
        <button class="install-dismiss" id="installDismiss">✕</button>
    </div>

    <!-- ==================== 顶部导航 ==================== -->
    <header class="header">
        <div class="header-top">
            <span class="app-title">🌐 翻译小工具</span>

            <!-- 翻译方向切换 -->
            <div class="lang-toggle" id="langToggle">
                <button class="lang-btn active" data-dir="en2zh">英 → 中</button>
                <button class="lang-btn" data-dir="zh2en">中 → 英</button>
            </div>
        </div>

        <!-- 模式切换 Tab -->
        <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab active" data-mode="paste">📝 粘贴翻译</button>
            <button class="mode-tab" data-mode="url">🌐 网址翻译</button>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="main-content">

        <!-- ===== 模式一：粘贴翻译 ===== -->
        <div class="mode-content active" id="modePaste">
            <div class="card">
                <textarea
                    class="input-area"
                    id="pasteInput"
                    placeholder="在这里粘贴英文（或中文）文字...&#10;&#10;支持多段落，会自动分行显示"
                ></textarea>
                <button class="btn-primary" id="btnPasteTranslate">⚡ 开始翻译</button>
            </div>
        </div>

        <!-- ===== 模式二：网址翻译 ===== -->
        <div class="mode-content" id="modeUrl">
            <div class="card">
                <input
                    type="url"
                    class="url-input"
                    id="urlInput"
                    placeholder="https://example.com/article"
                />
                <button class="btn-primary" id="btnUrlFetch">🔍 抓取并翻译</button>
            </div>
        </div>

        <!-- ===== 翻译结果区 ===== -->
        <div class="card" id="resultCard">
            <div class="empty-state" id="emptyState">
                <div class="icon">👆</div>
                <div class="text">
                    粘贴文字点击翻译<br>或切换到「网址翻译」模式
                </div>
            </div>
            <div class="lines-container" id="linesContainer" style="display:none;"></div>
        </div>

    </main>

    <!-- ==================== 页脚 ==================== -->
    <footer class="footer">
        点击任意一行即可翻译 · 再次点击恢复原文
    </footer>

    <!-- ============================================================
         JavaScript — 第1步：基础交互
         ============================================================ -->
    <script>
    (function() {
        // ============================================================
        //  PWA：Service Worker 注册
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function(reg) { console.log('[PWA] SW 注册成功:', reg.scope); })
                .catch(function(err) { console.log('[PWA] SW 注册失败:', err); });
        }

        // ============================================================
        //  PWA：安装提示
        // ============================================================
        var deferredPrompt = null;
        var installBanner = document.getElementById('installBanner');
        var installBtn = document.getElementById('installBtn');
        var installDismiss = document.getElementById('installDismiss');

        // 监听 beforeinstallprompt 事件（浏览器触发）
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            // 显示安装横幅
            if (installBanner) installBanner.classList.add('show');
        });

        // 用户点击「安装」
        if (installBtn) {
            installBtn.addEventListener('click', function() {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    console.log('[PWA] 安装结果:', result.outcome);
                    deferredPrompt = null;
                    if (installBanner) installBanner.classList.remove('show');
                });
            });
        }

        // 用户点击关闭
        if (installDismiss) {
            installDismiss.addEventListener('click', function() {
                if (installBanner) installBanner.classList.remove('show');
            });
        }

        // 已安装后隐藏横幅
        window.addEventListener('appinstalled', function() {
            console.log('[PWA] 已安装到桌面');
            if (installBanner) installBanner.classList.remove('show');
        });

        // ===== DOM 引用 =====
        const langToggle   = document.getElementById('langToggle');
        const modeTabs     = document.getElementById('modeTabs');
        const modePaste    = document.getElementById('modePaste');
        const modeUrl      = document.getElementById('modeUrl');
        const pasteInput   = document.getElementById('pasteInput');
        const urlInput     = document.getElementById('urlInput');
        const btnPaste     = document.getElementById('btnPasteTranslate');
        const btnUrl       = document.getElementById('btnUrlFetch');
        const emptyState   = document.getElementById('emptyState');
        const linesCont    = document.getElementById('linesContainer');

        // ===== 状态 =====
        const state = {
            direction: 'en2zh',   // 'en2zh' | 'zh2en'
            mode: 'paste',        // 'paste' | 'url'
            lines: [],            // 当前文本行 [{id, text, translatedText, isTranslated}]
        };

        // ===== 翻译方向切换 =====
        langToggle.addEventListener('click', function(e) {
            const btn = e.target.closest('.lang-btn');
            if (!btn) return;

            langToggle.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.direction = btn.dataset.dir;

            // 更新输入框 placeholder
            if (state.direction === 'en2zh') {
                pasteInput.placeholder = '在这里粘贴英文文字...\n\n支持多段落，会自动分行显示';
            } else {
                pasteInput.placeholder = '在这里粘贴中文文字...\n\n支持多段落，会自动分行显示';
            }

            // 如果已有翻译结果 → 全部恢复原文
            if (state.lines.length > 0) {
                var hasTranslated = false;
                for (var i = 0; i < state.lines.length; i++) {
                    if (state.lines[i].isTranslated) {
                        hasTranslated = true;
                        state.lines[i].isTranslated = false;
                        state.lines[i].translatedText = null;
                        state.lines[i].loading = false;
                    }
                }
                if (hasTranslated) {
                    // 重新渲染：全部回到原文状态
                    var lineEls = linesCont.querySelectorAll('.text-line');
                    for (var j = 0; j < lineEls.length; j++) {
                        lineEls[j].textContent = state.lines[j].text;
                        lineEls[j].classList.remove('translated', 'loading');
                    }
                }
            }
        });

        // ===== 模式切换 =====
        modeTabs.addEventListener('click', function(e) {
            const tab = e.target.closest('.mode-tab');
            if (!tab) return;

            // 更新 Tab 样式
            modeTabs.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            // 更新内容区
            state.mode = tab.dataset.mode;
            modePaste.classList.toggle('active', state.mode === 'paste');
            modeUrl.classList.toggle('active', state.mode === 'url');
        });

        // ============================================================
        //  第2步：智能分段 + 渲染 + 翻译核心
        // ============================================================

        // ===== 智能分段函数 =====
        function smartSegment(text) {
            if (!text) return [];
            // 按句号、问号、感叹号、换行分割（保留中文和英文标点）
            var raw = text.split(/[.。!！?？\n\r]+/);
            var result = [];
            for (var i = 0; i < raw.length; i++) {
                var trimmed = raw[i].trim();
                if (trimmed.length > 0) {
                    result.push(trimmed);
                }
            }
            // 没有任何标点分隔符 → 整段作为一行
            if (result.length === 0 && text.trim().length > 0) {
                result.push(text.trim());
            }
            return result;
        }

        // ===== 调用 Google 翻译 API =====
        function callTranslateAPI(text, direction) {
            var targetLang = (direction === 'en2zh') ? 'zh-CN' : 'en';
            var url = 'https://translate.googleapis.com/translate_a/single' +
                '?client=gtx&sl=auto&tl=' + targetLang +
                '&dt=t&q=' + encodeURIComponent(text);

            return fetch(url).then(function(response) {
                if (!response.ok) throw new Error('网络请求失败 (' + response.status + ')');
                return response.json();
            }).then(function(data) {
                // 解析响应: [[["译文","原文",...]], null, "en"]
                if (data && data[0] && data[0].length > 0) {
                    var parts = [];
                    for (var i = 0; i < data[0].length; i++) {
                        if (data[0][i] && data[0][i][0]) {
                            parts.push(data[0][i][0]);
                        }
                    }
                    var result = parts.join('');
                    if (result) return result;
                }
                throw new Error('翻译结果为空');
            });
        }

        // ===== 渲染文本行列表 =====
        function renderLines(segments) {
            // 清空旧内容
            linesCont.innerHTML = '';
            state.lines = [];

            for (var i = 0; i < segments.length; i++) {
                var lineData = {
                    id: i,
                    text: segments[i],
                    translatedText: null,
                    isTranslated: false,
                    loading: false
                };
                state.lines.push(lineData);

                var el = document.createElement('div');
                el.className = 'text-line';
                el.textContent = segments[i];
                el.setAttribute('data-line-id', String(i));
                linesCont.appendChild(el);
            }

            // 切换显示
            emptyState.style.display = 'none';
            linesCont.style.display = 'flex';

            console.log('[分段] 共拆分为 ' + segments.length + ' 行');
        }

        // ===== 点击行 → 翻译 / 恢复 =====
        function toggleLineTranslation(el, lineData) {
            // 加载中 → 忽略点击
            if (lineData.loading) return;

            // 已有翻译 → 切回原文
            if (lineData.isTranslated) {
                el.textContent = lineData.text;
                el.classList.remove('translated');
                lineData.isTranslated = false;
                return;
            }

            // 开始翻译
            lineData.loading = true;
            el.classList.add('loading');
            el.textContent = '⏳ 翻译中...';

            callTranslateAPI(lineData.text, state.direction)
                .then(function(translated) {
                    lineData.translatedText = translated;
                    lineData.isTranslated = true;
                    lineData.loading = false;
                    el.textContent = translated;
                    el.classList.remove('loading');
                    el.classList.add('translated');
                })
                .catch(function(err) {
                    console.error('[翻译失败] 行' + lineData.id + ':', err.message);
                    lineData.loading = false;
                    lineData.isTranslated = false;
                    el.textContent = lineData.text + '  ❌ 翻译失败，点击重试';
                    el.classList.remove('loading');
                });
        }

        // ===== 事件委托：监听行点击 =====
        linesCont.addEventListener('click', function(e) {
            var lineEl = e.target.closest('.text-line');
            if (!lineEl) return;
            var id = parseInt(lineEl.getAttribute('data-line-id'), 10);
            if (isNaN(id) || !state.lines[id]) return;
            toggleLineTranslation(lineEl, state.lines[id]);
        });

        // ===== 粘贴翻译按钮 =====
        btnPaste.addEventListener('click', function() {
            var text = pasteInput.value.trim();
            if (!text) {
                // 输入框闪红提示
                pasteInput.style.borderColor = '#FF5252';
                pasteInput.focus();
                setTimeout(function() {
                    pasteInput.style.borderColor = '';
                }, 800);
                return;
            }

            var segments = smartSegment(text);
            if (segments.length === 0) {
                alert('未能识别有效文字，请检查输入内容');
                return;
            }

            renderLines(segments);

            // 滚动到结果区
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        });

        // ===== 网址抓取按钮（占位 — 第3步实现） =====
        btnUrl.addEventListener('click', function() {
            const url = urlInput.value.trim();
            if (!url) {
                alert('请输入要翻译的网页地址');
                return;
            }
            // 第3步将在这里实现抓取 + 提取正文 + 翻译
            alert('🚧 网址翻译功能将在第3步实现\n\n已收到链接：' + url);
        });

        // ===== 日志 =====
        console.log('🌐 翻译小工具 · 第2步：粘贴翻译核心功能就绪');
        console.log('   翻译方向:', state.direction);
        console.log('   当前模式:', state.mode);
        console.log('   功能: 粘贴 → 智能分行 → 点击翻译 → 再点恢复');
    })();
    </script>

</body>
</html>
