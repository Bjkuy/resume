<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI 短片预览 —《她的早晨》</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #252525;
            --text: #e0e0e0;
            --text-secondary: #999;
            --accent: #d4a574;
            --accent2: #8b5e3c;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 顶部 ===== */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* ===== 最终视频区 ===== */
        .final-video-section {
            max-width: 720px;
            margin: 0 auto 40px;
            padding: 0 16px;
        }
        .video-placeholder {
            aspect-ratio: 9 / 16;
            background: #111;
            border: 2px dashed #444;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: all 0.3s;
        }
        .video-placeholder.has-video {
            border: none;
        }
        .video-placeholder video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: var(--radius);
        }
        .video-placeholder .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
        .video-placeholder .hint { font-size: 14px; line-height: 1.8; text-align: center; }
        .upload-btn {
            margin-top: 12px;
            padding: 10px 24px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .upload-btn:hover { opacity: 0.85; }

        /* ===== 进度条 ===== */
        .progress-section {
            max-width: 720px;
            margin: 0 auto 30px;
            padding: 0 16px;
        }
        .progress-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .progress-steps {
            display: flex;
            gap: 6px;
        }
        .progress-step {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            transition: background 0.3s;
        }
        .progress-step.done { background: var(--accent); }
        .progress-step.current { background: var(--accent); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== 分镜网格 ===== */
        .storyboard {
            max-width: 900px;
            margin: 0 auto 60px;
            padding: 0 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .shot-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .shot-card:hover { transform: translateY(-2px); }
        .shot-preview {
            aspect-ratio: 4 / 3;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 40px;
            position: relative;
            overflow: hidden;
        }
        .shot-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shot-preview .shot-num {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .shot-info {
            padding: 14px;
        }
        .shot-info h3 {
            font-size: 15px;
            margin-bottom: 4px;
        }
        .shot-info .duration {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .shot-info .description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .shot-info .difficulty {
            display: inline-block;
            margin-top: 8px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: #333;
            color: #aaa;
        }
        .shot-info .difficulty.easy { background: #1a3a1a; color: #6fcf6f; }
        .shot-info .difficulty.medium { background: #3a2a1a; color: #f0c060; }
        .shot-info .prompt-copy {
            display: block;
            margin-top: 10px;
            padding: 6px 12px;
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
        }
        .shot-info .prompt-copy:hover {
            background: #444;
            color: #fff;
        }
        .shot-info .prompt-copy.copied {
            background: #2a3a2a;
            border-color: #6fcf6f;
            color: #6fcf6f;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .storyboard {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header h1 { font-size: 22px; }
            .shot-card { display: flex; }
            .shot-preview { width: 120px; min-width: 120px; aspect-ratio: auto; }
            .shot-info { flex: 1; }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部 ===== -->
    <header class="header">
        <h1>🎬 她的早晨</h1>
        <p class="subtitle">AI 短片 · 美女与宠物 · 日常纪实风 · 30-50秒</p>
    </header>

    <!-- ===== 最终视频预览 ===== -->
    <section class="final-video-section">
        <div class="video-placeholder" id="videoPlaceholder">
            <span class="icon">🎥</span>
            <span class="hint">
                点击下方按钮上传视频<br>或拖拽视频文件到此处
            </span>
        </div>
        <input type="file" id="videoUpload" accept="video/*" style="display:none;">
        <div style="text-align:center;">
            <button class="upload-btn" id="uploadBtn">📤 上传视频预览</button>
            <span style="font-size:12px;color:#666;margin-left:10px;" id="fileName"></span>
        </div>
    </section>

    <!-- ===== 制作进度 ===== -->
    <section class="progress-section">
        <div class="progress-title">📋 制作进度 · 点击复选框标记完成</div>
        <div class="progress-steps" id="progressSteps">
            <div class="progress-step" data-step="1" title="剧本"></div>
            <div class="progress-step" data-step="2" title="角色设定"></div>
            <div class="progress-step" data-step="3" title="分镜"></div>
            <div class="progress-step" data-step="4" title="生成图片"></div>
            <div class="progress-step" data-step="5" title="图生视频"></div>
            <div class="progress-step" data-step="6" title="剪辑后期"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#555;margin-top:6px;">
            <span>剧本</span><span>角色</span><span>分镜</span><span>图片</span><span>视频</span><span>成片</span>
        </div>
    </section>

    <!-- ===== 分镜表 ===== -->
    <section class="storyboard" id="storyboard">
        <!-- JS 动态生成 -->
    </section>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
    // ============================================================
    //  分镜数据
    // ============================================================
    var shots = [
        {
            num: 1, title: '清晨房间',
            duration: '8秒', difficulty: 'easy',
            desc: '房间全景，阳光透过薄纱窗帘洒进来，微风轻轻吹动窗帘，画面温暖安静。',
            prompt: 'Wide shot of a cozy bedroom interior, morning sunlight streaming through sheer white curtains, gentle breeze moving the curtains slightly, wooden floor, a bed with white bedding, warm natural light, photorealistic, shot on Fujifilm X-T5, 35mm lens, candid daily life photography, subtle film grain, warm tone, no cinematic lighting --ar 16:9',
            videoAction: 'curtains swaying gently in breeze, slow motion, natural'
        },
        {
            num: 2, title: '美女醒来',
            duration: '6秒', difficulty: 'medium',
            desc: '中景，年轻美女侧躺睡觉，睫毛微颤，缓缓睁开眼睛，自然光打在脸上。',
            prompt: 'Medium shot of a young Chinese woman sleeping on her side, natural morning light on her face, minimal makeup, long dark hair spread on pillow, peaceful expression, white bedding, eyelashes fluttering slightly, about to wake up, candid moment, photorealistic, shot on Fujifilm X-T5, 35mm f/2, natural skin texture, subtle grain, warm morning tone --ar 16:9',
            videoAction: 'eyes slowly opening, subtle movement, minimal motion, natural speed'
        },
        {
            num: 3, title: '床边的狗',
            duration: '8秒', difficulty: 'easy',
            desc: '近景，一只金毛犬趴在床边木地板上，尾巴轻轻摇动，等待主人醒来。',
            prompt: 'Close-up of a golden retriever lying on wooden floor next to a bed, morning sunlight illuminating the fur, tail wagging gently, loyal expression looking up at the bed, natural pet photography style, shallow depth of field, warm tones, photorealistic, shot on Fujifilm X-T5, candid moment, subtle film grain --ar 16:9',
            videoAction: 'tail wagging slowly, gentle breathing, minimal motion'
        },
        {
            num: 4, title: '摸狗头',
            duration: '10秒', difficulty: 'medium',
            desc: '中景，美女坐在床边伸手轻抚狗头，狗抬头蹭她的手，温馨互动。',
            prompt: 'Medium shot of a young Chinese woman sitting on edge of bed, reaching down to pet a golden retriever on the floor, hand gently touching the dog head, the dog looking up with eyes full of trust, warm morning light, natural candid moment, cozy atmosphere, photorealistic, shot on Fujifilm X-T5, 35mm lens, subtle grain, no posing --ar 16:9',
            videoAction: 'hand petting dog head slowly, dog leaning into the touch, gentle motion'
        },
        {
            num: 5, title: '窗边背影',
            duration: '10秒', difficulty: 'easy',
            desc: '全景，一人一狗站在窗边的背影，她端着咖啡杯，热气袅袅，狗安静蹲在脚边。',
            prompt: 'Wide back view shot of a young woman in a white linen shirt standing by a window holding a coffee mug, golden retriever sitting calmly at her feet, morning light creating a soft silhouette, steam rising from the coffee, peaceful quiet morning moment, photorealistic, shot on Fujifilm X-T5, 35mm lens, natural grain, warm tone, candid atmosphere --ar 16:9',
            videoAction: 'steam rising from coffee gently, minimal camera movement, tranquil scene'
        }
    ];

    // ============================================================
    //  渲染分镜卡片
    // ============================================================
    var storyboard = document.getElementById('storyboard');
    shots.forEach(function(shot) {
        var card = document.createElement('div');
        card.className = 'shot-card';

        var diffClass = shot.difficulty === 'easy' ? 'easy' : 'medium';
        var diffLabel = shot.difficulty === 'easy' ? '⭐ 低难度' : '⭐⭐ 中等';

        card.innerHTML =
            '<div class="shot-preview">' +
                '<img src="shots/shot-' + shot.num + '.jpg" alt="镜头' + shot.num + '" ' +
                'onerror="this.style.display=\'none\';this.parentNode.querySelector(\'.fallback\').style.display=\'flex\';" />' +
                '<span class="fallback" style="display:none;font-size:40px;">🎬</span>' +
                '<span class="shot-num">镜头 ' + shot.num + '</span>' +
            '</div>' +
            '<div class="shot-info">' +
                '<h3>' + shot.title + '</h3>' +
                '<span class="duration">⏱ ' + shot.duration + '</span>' +
                '<p class="description">' + shot.desc + '</p>' +
                '<span class="difficulty ' + diffClass + '">' + diffLabel + '</span>' +
                '<button class="prompt-copy" data-shot="' + shot.num + '">📋 复制 Midjourney 提示词</button>' +
            '</div>';
        storyboard.appendChild(card);
    });

    // ============================================================
    //  复制提示词
    // ============================================================
    storyboard.addEventListener('click', function(e) {
        if (!e.target.classList.contains('prompt-copy')) return;
        var shotNum = parseInt(e.target.getAttribute('data-shot'));
        var shot = shots[shotNum - 1];
        if (!shot) return;

        // 复制到剪贴板
        var textarea = document.createElement('textarea');
        textarea.value = shot.prompt;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);

        // 视觉反馈
        e.target.textContent = '✅ 已复制！';
        e.target.classList.add('copied');
        setTimeout(function() {
            e.target.textContent = '📋 复制 Midjourney 提示词';
            e.target.classList.remove('copied');
        }, 1500);

        showToast('✅ 镜头' + shotNum + ' 提示词已复制，粘贴到 Midjourney 即可');
    });

    // ============================================================
    //  视频上传/拖拽
    // ============================================================
    var videoPlaceholder = document.getElementById('videoPlaceholder');
    var videoUpload = document.getElementById('videoUpload');
    var uploadBtn = document.getElementById('uploadBtn');
    var fileNameEl = document.getElementById('fileName');

    uploadBtn.addEventListener('click', function() {
        videoUpload.click();
    });

    videoUpload.addEventListener('change', function(e) {
        loadVideo(e.target.files[0]);
    });

    // 拖拽上传
    videoPlaceholder.addEventListener('dragover', function(e) {
        e.preventDefault();
        videoPlaceholder.style.borderColor = '#d4a574';
    });
    videoPlaceholder.addEventListener('dragleave', function() {
        videoPlaceholder.style.borderColor = '#444';
    });
    videoPlaceholder.addEventListener('drop', function(e) {
        e.preventDefault();
        videoPlaceholder.style.borderColor = '#444';
        var file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('video/')) {
            loadVideo(file);
        }
    });

    function loadVideo(file) {
        if (!file) return;
        var url = URL.createObjectURL(file);
        videoPlaceholder.innerHTML = '<video src="' + url + '" controls autoplay loop playsinline></video>';
        videoPlaceholder.classList.add('has-video');
        fileNameEl.textContent = file.name;
        showToast('🎬 视频已加载，可以播放预览了');
        // 更新进度
        updateProgress(6);
    }

    // ============================================================
    //  进度条交互
    // ============================================================
    var progressState = [false, false, false, false, false, false];
    var progressSteps = document.getElementById('progressSteps');

    progressSteps.addEventListener('click', function(e) {
        if (!e.target.classList.contains('progress-step')) return;
        var step = parseInt(e.target.getAttribute('data-step'));
        progressState[step - 1] = !progressState[step - 1];
        updateProgressUI();
        saveProgress();
    });

    function updateProgress(step) {
        for (var i = 0; i < step; i++) progressState[i] = true;
        updateProgressUI();
        saveProgress();
    }

    function updateProgressUI() {
        var steps = progressSteps.querySelectorAll('.progress-step');
        steps.forEach(function(step, i) {
            step.classList.remove('done', 'current');
            if (progressState[i]) step.classList.add('done');
            // 找到第一个未完成的标记为 current
            if (i === progressState.indexOf(false)) {
                step.classList.add('current');
            }
        });
    }

    function saveProgress() {
        try {
            localStorage.setItem('ai-film-progress', JSON.stringify(progressState));
        } catch(e) {}
    }

    function loadProgress() {
        try {
            var saved = localStorage.getItem('ai-film-progress');
            if (saved) progressState = JSON.parse(saved);
        } catch(e) {}
        updateProgressUI();
    }
    loadProgress();

    // ============================================================
    //  Toast
    // ============================================================
    function showToast(msg) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(function() {
            toast.classList.remove('show');
        }, 2500);
    }

    console.log('🎬 AI 短片预览台就绪 · 5个镜头 · 30-50秒');
    console.log('   点击提示词按钮 → 复制 → 粘贴到 Midjourney');
    console.log('   生成图片后放到 ai-film/shots/ 文件夹');
    console.log('   完成视频后拖拽到页面即可预览');
    </script>
</body>
</html>
